name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release - ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - os-name: Linux-aarch64
            runs-on: ubuntu-24.04
            target: aarch64-unknown-linux-musl
          - os-name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
          - os-name: macOS-x86_64
            runs-on: macOS-latest
            target: x86_64-apple-darwin
          - os-name: macOS-aarch64
            runs-on: macOS-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      #######################################################################
      # LINUX DEPENDENCIES (Ubuntu 24.04)
      #######################################################################
      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get -y update
          sudo apt-get -y install \
            gcc \
            clang \
            libclang-dev \
            libgssapi-krb5-2 \
            libkrb5-dev \
            libsasl2-modules-gssapi-mit \
            musl-tools \
            gcc-mingw-w64-x86-64 \
            pkg-config


      #######################################################################
      # WINDOWS DEPENDENCIES
      #######################################################################
      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install LLVM for clang
          winget install LLVM -e --silent

          # Install MIT Kerberos for Windows
          $url = "https://web.mit.edu/kerberos/dist/kfw/4.1/kfw-4.1.1-amd64.msi"
          Invoke-WebRequest $url -OutFile "kfw.msi"
          Start-Process msiexec.exe -ArgumentList "/i kfw.msi /qn" -Wait

          # Set environment paths for Clang and Kerberos
          echo "KERB_ROOT=C:\Program Files\MIT\Kerberos" >> $env:GITHUB_ENV
          echo "INCLUDE=C:\Program Files\MIT\Kerberos\include" >> $env:GITHUB_ENV
          echo "LIB=C:\Program Files\MIT\Kerberos\lib" >> $env:GITHUB_ENV


      #######################################################################
      # MACOS DEPENDENCIES
      #######################################################################
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            llvm \
            heimdal


      #######################################################################
      # BUILD
      #######################################################################
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release"
          strip: true


      #######################################################################
      # RELEASE
      #######################################################################
      - name: Publish artifacts and release
        uses: houseabsolute/actions-rust-release@v0
        with:
          executable-name: ubi
          target: ${{ matrix.platform.target }}
